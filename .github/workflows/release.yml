name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    environment: release
    env:
      WTS_EXPERIENCE_ROOT_PUBLIC_KEY: ${{ vars.WTS_EXPERIENCE_ROOT_PUBLIC_KEY }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: node scripts/verify-release-root.mjs
      - run: npm run verify
      - run: node scripts/publish-release.test.mjs
      - name: Verify tag and package versions match
        run: test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - name: Publish or verify the existing npm artifact
        run: node scripts/publish-release.mjs
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p 'require("./package.json").version')"
          prerelease_flag=""
          case "$version" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              $prerelease_flag
